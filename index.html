<script>
window.addEventListener('error', function (e) {
  var r = document.getElementById('root');

    r.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#b00;">'

      + '<code style="display:block;margin-top:8px;padding:8px;background:#fee;border-radius:6px;color:#900;">'
      + (e.message || e) + '</code><br>'
      + '※ 인터넷(와이파이) 연결을 확인하거나, 휴대폰 데이터로 다시 열어보세요.'
      + '</div>';
  }
});
function checkLibs() {
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
    var r = document.getElementById('root');
    if (r) r.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#b00;">'
      + '<b>필요한 파일을 불러오지 못했어요 (React 로드 실패).</b><br><br>'

      + '<b>휴대폰 데이터(LTE/5G)</b>로 다시 열어보세요.</div>';
    return false;
  }
  return true;
}
</script>

};
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(EvaluationApp));
} catch (err) {
  var r = document.getElementById('root');
  if (r) r.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#b00;"><b>앱 실행 오류</b><br><code style="display:block;margin-top:8px;padding:8px;background:#fee;border-radius:6px;">'+(err && err.message ? err.message : err)+'</code></div>';
}
}
